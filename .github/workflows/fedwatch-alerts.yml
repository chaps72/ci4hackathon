name: FedWatch critical alerts

on:
  # Schedule paused 2026-07-03: delivery secrets (TEAMS_WEBHOOK_URL / SMTP_*)
  # were never configured, so every scheduled run failed with nothing to send.
  # To resume: add the secrets in Settings > Secrets > Actions, then restore:
  #   schedule:
  #     - cron: "0 13,17,21 * * 1-5"
  workflow_dispatch: {}

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests==2.34.2

      - name: Restore alerted-items state
        uses: actions/cache@v4
        with:
          path: .fedwatch_seen.json
          key: fedwatch-seen-${{ github.run_id }}
          restore-keys: fedwatch-seen-

      - name: Send alerts
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          FEDWATCH_APP_URL: ${{ secrets.FEDWATCH_APP_URL }}
          ALERT_MIN_LEVEL: HIGH
        run: python send_alerts.py
