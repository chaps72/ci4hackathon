name: FedWatch daily digest

permissions:
  contents: write

# A backup cron firing while an earlier run is still holding for 5pm queues
# behind it (then sees the sent marker and skips) instead of double-posting.
concurrency:
  group: fedwatch-daily-digest
  cancel-in-progress: false

on:
  schedule:
    # Deliver AT 5pm ET: GitHub's cron is best-effort (often 20-70 min late,
    # occasionally dropped), so the first cron fires early and the script
    # holds delivery until exactly 5:00pm America/New_York. The later crons
    # are backups that post immediately (already past 5pm) if an earlier
    # firing never ran. Weekends/holidays are skipped and a once-per-day
    # marker stops double-posting, so extra firings are harmless.
    - cron: "30 20 * * 1-5"   # 4:30pm EDT / 3:30pm EST -> waits for 5pm
    - cron: "10 21 * * 1-5"   # 5:10pm EDT / 4:10pm EST
    - cron: "10 22 * * 1-5"   # 6:10pm EDT / 5:10pm EST
    - cron: "0 23 * * 1-5"    # 7:00pm EDT / 6:00pm EST
  workflow_dispatch:
    inputs:
      force:
        description: "Force a resend even if today's items already went out (for testing delivery)"
        type: boolean
        default: false
      only:
        description: "Limit delivery to one channel (blank = all)"
        type: choice
        options: ["", "slack", "teams", "email"]
        default: ""

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests==2.34.2 anthropic==0.116.0

      - name: Restore digest seen-state
        uses: actions/cache@v4
        with:
          path: |
            .fedwatch_digest_seen.json
            .fedwatch_history.json
          key: fedwatch-digest-seen-${{ github.run_id }}
          restore-keys: fedwatch-digest-seen-

      - name: Send daily digest
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FEDWATCH_APP_URL: ${{ secrets.FEDWATCH_APP_URL }}
          DIGEST_DAYS_BACK: "2"
          FEDWATCH_FOCUS: nih
          DIGEST_FORCE: ${{ inputs.force }}
          DIGEST_ONLY: ${{ inputs.only }}
        run: python send_digest.py

      - name: Publish digest page
        run: |
          if [ -n "$(git status --porcelain docs/)" ]; then
            git config user.name "FedWatch Bot"
            git config user.email "noreply@anthropic.com"
            git add docs/
            git commit -m "Publish digest page $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No digest page changes to publish."
          fi
