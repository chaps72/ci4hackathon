name: FedWatch daily digest

permissions:
  contents: write

on:
  schedule:
    # Twin crons so one always lands at 5pm America/New_York across DST;
    # the script skips the off-hour firing, weekends, and US federal holidays.
    - cron: "0 21 * * 1-5"
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a resend even if today's items already went out (for testing delivery)"
        type: boolean
        default: false
      only:
        description: "Limit delivery to one channel (blank = all)"
        type: choice
        options: ["", "slack", "teams", "email"]
        default: ""

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Restore digest seen-state
        uses: actions/cache@v4
        with:
          path: |
            .fedwatch_digest_seen.json
            .fedwatch_history.json
          key: fedwatch-digest-seen-${{ github.run_id }}
          restore-keys: fedwatch-digest-seen-

      - name: Send daily digest
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FEDWATCH_APP_URL: ${{ secrets.FEDWATCH_APP_URL }}
          DIGEST_DAYS_BACK: "2"
          FEDWATCH_FOCUS: nih
          DIGEST_FORCE: ${{ inputs.force }}
          DIGEST_ONLY: ${{ inputs.only }}
        run: python send_digest.py

      - name: Publish digest page
        run: |
          if [ -n "$(git status --porcelain docs/)" ]; then
            git config user.name "FedWatch Bot"
            git config user.email "noreply@anthropic.com"
            git add docs/
            git commit -m "Publish digest page $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No digest page changes to publish."
          fi
