name: FedWatch historical dump

on:
  workflow_dispatch: {}

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Dump historical window
        env:
          FR_GTE: "2026-06-20"
          FR_LTE: "2026-06-23"
        run: python dump_historical.py
