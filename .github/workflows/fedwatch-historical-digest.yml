name: FedWatch historical digest
permissions:
  contents: write
on:
  workflow_dispatch: {}
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests anthropic
      - name: Build historical digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FR_GTE: "2026-05-19"
          FR_LTE: "2026-05-22"
        run: python historical_digest.py
      - name: Commit page
        run: |
          if [ -n "$(git status --porcelain docs/)" ]; then
            git config user.name "FedWatch Bot"
            git config user.email "noreply@anthropic.com"
            git add docs/
            git commit -m "Historical example digest 2026-05-22"
            git push
          fi
